<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>2026年1月Pad销售数据看板 v2</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
            background: #f5f7fa; 
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 月份切片器 */
        .month-slicer {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 20px;
            background: white;
            padding: 4px;
            border-radius: 6px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .month-btn {
            padding: 8px 20px;
            border: 1px solid #d9d9d9;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin: 0;
        }
        .month-btn:first-child { border-radius: 4px 0 0 4px; }
        .month-btn:last-child { border-radius: 0 4px 4px 0; }
        .month-btn:not(:first-child) { border-left: none; }
        .month-btn:hover { background: #f5f5f5; }
        .month-btn.active { 
            background: #1890ff; 
            color: white;
            border-color: #1890ff;
        }
        
        /* 顶部标题栏 */
        .header-banner {
            background: linear-gradient(135deg, #ff9500 0%, #ff7700 100%);
            color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-banner h1 { 
            font-size: 28px; 
            font-weight: 600; 
            margin: 0;
            letter-spacing: 1px;
        }
        .header-banner p { 
            font-size: 14px; 
            margin-top: 10px; 
            opacity: 0.9;
        }
        
        /* 第一行：倒计时 + 达成进度 + 店铺Mix */
        .top-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            font-weight: normal;
            text-align: center;
        }
        
        /* 倒计时 */
        .countdown-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .countdown-item {
            background: #1890ff;
            color: white;
            padding: 12px 16px;
            border-radius: 4px;
            text-align: center;
            min-width: 50px;
        }
        .countdown-num {
            font-size: 28px;
            font-weight: bold;
            line-height: 1;
        }
        .countdown-label {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.9;
        }
        .countdown-sep {
            font-size: 24px;
            color: #1890ff;
            font-weight: bold;
        }
        
        /* 达成进度 */
        .achievement-rate {
            text-align: center;
        }
        .achievement-percent {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            line-height: 1;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background: #f0f0f0;
            border-radius: 6px;
            margin: 16px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #52c41a;
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .achievement-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .info-current {
            color: #1890ff;
            font-weight: 500;
        }
        .info-target {
            color: #999;
        }
        .info-target input {
            border: 1px solid #d9d9d9;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 4px;
            width: 60px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }
        
        /* 第二行：4个渠道卡片 */
        .channel-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .channel-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        .channel-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }
        .channel-percent {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
        }
        .channel-progress {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .channel-progress-fill {
            height: 100%;
            background: #1890ff;
            border-radius: 4px;
        }
        .channel-values {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .value-current {
            color: #1890ff;
            font-weight: 500;
        }
        .value-target {
            color: #999;
        }
        .value-target input {
            border: 1px solid #d9d9d9;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
            width: 50px;
            text-align: center;
            font-size: 13px;
            color: #333;
        }
        
        /* 图表行 */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* 每日销量走势特殊样式 */
        .daily-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
        }
        .stat-item {
            font-size: 14px;
            color: #666;
        }
        .stat-value {
            color: #1890ff;
            font-weight: bold;
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .top-row { grid-template-columns: 1fr; }
            .channel-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 月份切片器 -->
        <div class="month-slicer" id="monthSlicer"></div>
        
        <!-- 顶部标题 -->

                    <span class="value-current" id="doukuai-current">8,844</span>

    </div>

    <script>
        const dashboardData = {"1月": {"month": "1月", "month_num": 1, "last_day": 31, "targets": {"总目标": 47.5, "官网": 7.0, "天猫": 23.5, "京东官旗": 5.0, "抖快": 12.0}, "actual_total": 27.1, "achievement_rate": 57.0, "channels": {"天猫": 9.9, "官网": 5.9, "京东官旗": 2.5, "抖快": 8.8}, "channel_targets": {"天猫": 23.5, "官网": 7.0, "京东官旗": 5.0, "抖快": 12.0}, "store_mix": {"天猫": 9.9, "官网": 5.9, "国代": 5.7, "抖快": 3.2, "京东官旗": 2.5}, "models": {"sales": {"小新平板11": 15458, "拯救者Y700 4代": 6078, "PadProGT": 3247, "PadPro12.7": 1426, "小新平板12.1": 484, "小新pad 2023": 291, "小新pad 2024": 38, "YogaPadPro 14.5": 36, "拯救者Y700 3代": 11, "Pad Studio": 6, "小新pad plus 2023": 6, "Pad Pro12.7": 5, "YogaPadPro 12.7": 4, "Pad 2024 舒视版": 2, "Y700 2代": 2, "Pad Pro12.7 类纸屏": 1, "拯救者Y700 3代 超控版": 1, "Pad 2024 舒视智学版": 1}, "key_models": {"小新平板11": 15458, "拯救者Y700 4代": 6078, "PadProGT": 3247, "PadPro12.7": 1426, "小新平板12.1": 484, "小新pad 2023": 291}, "daily_avg": {"小新平板11": 498.6, "拯救者Y700 4代": 196.1, "PadProGT": 104.7, "PadPro12.7": 46.0, "小新平板12.1": 15.6, "小新pad 2023": 9.4}}, "daily": {"2026-01-01": 459, "2026-01-02": 304, "2026-01-03": 331, "2026-01-04": 359, "2026-01-05": 341, "2026-01-06": 459, "2026-01-07": 699, "2026-01-08": 925, "2026-01-09": 781, "2026-01-10": 845, "2026-01-11": 771, "2026-01-12": 819, "2026-01-13": 780, "2026-01-14": 756, "2026-01-15": 803, "2026-01-16": 967, "2026-01-17": 1019, "2026-01-18": 1127, "2026-01-19": 1016, "2026-01-20": 985, "2026-01-21": 1090, "2026-01-22": 1061, "2026-01-23": 1186, "2026-01-24": 1074, "2026-01-25": 1043, "2026-01-26": 979, "2026-01-27": 1077, "2026-01-28": 1475, "2026-01-29": 1346, "2026-01-30": 1157, "2026-01-31": 1064}, "days_count": 31, "last_7_avg": 1163.0, "monthly_avg": 874.0}, "2月": {"month": "2月", "month_num": 2, "last_day": 28, "targets": {"总目标": 47.5, "官网": 7.0, "天猫": 23.5, "京东官旗": 5.0, "抖快": 12.0}, "actual_total": 18.4, "achievement_rate": 38.8, "channels": {"天猫": 7.0, "官网": 4.7, "京东官旗": 3.2, "抖快": 3.6}, "channel_targets": {"天猫": 23.5, "官网": 7.0, "京东官旗": 5.0,         let currentMonth = Object.keys(dashboardData)[0];
        
        function init() {
            renderMonthSlicer();
            updateDashboard(currentMonth);
            
            // 动态加载月份数据函数
            function loadMonthData(month) {
                const monthFiles = {
                    '2026-01': 'index.html',
                    '2026-02': '2026-02.html',
                    '2026-03': '2026-03.html',
                    '2025-Q4': 'fy25q4.html'
                };
                
                const targetFile = monthFiles[month];
                if (targetFile && targetFile !== 'index.html') {
                    window.location.href = targetFile;
                }
            }
            
            // 月份切片器点击事件
            const monthBtns = document.querySelectorAll('.month-btn');
            monthBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除所有按钮的 active 类
                    monthBtns.forEach(b => b.classList.remove('active'));
                    // 给当前按钮添加 active 类
                    this.classList.add('active');
                    
                    const selectedMonth = this.getAttribute('data-month');
                    console.log('切换到月份:', selectedMonth);
                    
                    // 更新页面标题
                    const monthNames = {
                        '2026-01': '1月直营平板销售',
                        '2026-02': '2月直营平板销售',
                        '2026-03': '3月直营平板销售',

                    };
                    document.getElementById('page-title').textContent = monthNames[selectedMonth] || '直营平板销售';
                    
                    // 加载对应月份数据
                    if (selectedMonth !== '2026-01') {
                        loadMonthData(selectedMonth);

                    }

        }
        
        function renderMonthSlicer() {
            // 月份切片器已在HTML中静态定义，这里不需要动态创建
            console.log('月份切片器已初始化');
        }
        
        function updateDashboard(month) {
            const data = dashboardData[month];
            
            // 更新标题
            document.getElementById('headerTitle').textContent = month + '直营平板销售';
            document.getElementById('headerSubtitle').innerHTML = '数据时间：2026年' + month + ' | 生成时间：<span id="genTime">' + document.getElementById('genTime').textContent + '</span>';
            document.querySelectorAll('.month-num').forEach(el => el.textContent = data.month_num);
            
            // 更新倒计时
            updateCountdown(data.month_num, data.last_day);
            
            // 更新达成进度
            document.getElementById('achievementRate').textContent = data.achievement_rate + '%';
            document.getElementById('progressBar').style.width = Math.min(data.achievement_rate, 100) + '%';
            document.getElementById('currentSales').textContent = data.actual_total;
            
            // 更新渠道卡片
            renderChannelCards(data);
            
            // 更新图表
            renderCharts(data);
        }
        
        function updateCountdown(monthNum, lastDay) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const endDate = new Date(currentYear, monthNum, lastDay, 23, 59, 59);
            
            const diff = endDate - now;
            
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                document.getElementById('cd-months').textContent = 0;
                document.getElementById('cd-days').textContent = days;
                document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
            } else {
                document.getElementById('cd-months').textContent = 0;
                document.getElementById('cd-days').textContent = 0;
                document.getElementById('cd-hours').textContent = '00';
            }
        }
        
        function renderChannelCards(data) {
            // 更新静态渠道卡片的数据
            const channelMap = {
                'guanwang': '官网',
                'tianmao': '天猫',
                'jingdong': '京东官旗',
                'doukuai': '抖快'
            };
            
            Object.entries(channelMap).forEach(([id, chName]) => {
                const actual = data.channels[chName] || 0;
                const target = data.channel_targets[chName];
                const rate = target > 0 ? Math.round((actual / target) * 100) : 0;
                
                // 更新百分比
                const percentEl = document.getElementById(id + '-percent');
                if (percentEl) percentEl.textContent = rate + '%';
                
                // 更新进度条
                const barEl = document.getElementById(id + '-bar');
                if (barEl) barEl.style.width = Math.min(rate, 100) + '%';
                
                // 更新当前值
                const currentEl = document.getElementById(id + '-current');
                if (currentEl) currentEl.textContent = (actual * 1000).toLocaleString();
                
                // 更新目标输入框（如果用户没有手动修改过）
                const targetInput = document.getElementById(id + '-target');
                if (targetInput && !targetInput.dataset.userModified) {
                    targetInput.value = (target * 1000);
                }
            });
        }
        
        function updateChannelTarget(channel) {
            const input = document.getElementById(channel + '-target');
            if (!input) return;
            
            // 标记为用户已修改
            input.dataset.userModified = 'true';
            
            const target = parseFloat(input.value) || 0;
            const currentText = document.getElementById(channel + '-current').textContent;
            const current = parseFloat(currentText.replace(/,/g, '')) || 0;
            const rate = target > 0 ? Math.round((current / target) * 100) : 0;
            
            document.getElementById(channel + '-percent').textContent = rate + '%';
            document.getElementById(channel + '-bar').style.width = Math.min(rate, 100) + '%';
        }
        
        function updateTarget(value) {
            const target = parseFloat(value) || 47500;
            const currentText = document.getElementById('currentSales').textContent;
            const current = parseFloat(currentText) * 1000 || 27100;
            const rate = target > 0 ? ((current / target) * 100).toFixed(1) : 0;
            
            document.getElementById('achievementRate').textContent = rate + '%';
            document.getElementById('progressBar').style.width = Math.min(rate, 100) + '%';
        }
        
        function renderCharts(data) {
            // 店铺Mix饼图
            const storeColors = ['#1890ff', '#52c41a', '#faad14', '#f5222d', '#722ed1'];
            const storeData = [{
                values: Object.values(data.store_mix),
                labels: Object.keys(data.store_mix),
                type: 'pie',
                textinfo: 'label+percent',
                textposition: 'inside',
                marker: { colors: storeColors },
                hovertemplate: '%{label}<br>%{percent}<br>%{value}K<extra></extra>',
                showlegend: false
            }];
            Plotly.newPlot('store-mix-chart', storeData, { 
                margin: { l: 10, r: 10, t: 10, b: 10 }, 
                height: 180,
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, {responsive: true});
            
            // 重点机型分布Mix（甜甜圈图）
            const modelColors = ['#1890ff', '#52c41a', '#722ed1', '#faad14', '#f5222d', '#13c2c2'];
            const modelNames = Object.keys(data.models.key_models).slice(0, 6);
            const modelValues = Object.values(data.models.key_models).slice(0, 6);
            const modelMixData = [{
                values: modelValues,
                labels: modelNames,
                type: 'pie',
                hole: 0.4,
                textinfo: 'percent',
                textposition: 'inside',
                marker: { colors: modelColors },
                hovertemplate: '%{label}<br>%{percent}<br>%{value}台<extra></extra>',
                showlegend: true,
                legend: { orientation: 'h', y: -0.1 }
            }];
            Plotly.newPlot('model-mix-chart', modelMixData, { 
                margin: { l: 20, r: 20, t: 20, b: 60 }, 
                height: 300,
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, {responsive: true});
            
            // 重点机型日均销售（横向条形图）
            const sortedModels = Object.entries(data.models.daily_avg).sort((a, b) => a[1] - b[1]);
            const barData = [{
                y: sortedModels.map(x => x[0]),
                x: sortedModels.map(x => x[1]),
                type: 'bar',
                orientation: 'h',
                marker: { color: '#1890ff' },
                text: sortedModels.map(x => x[1]),
                textposition: 'outside',
                hovertemplate: '%{y}<br>日均: %{x}台<extra></extra>'
            }];
            Plotly.newPlot('model-daily-chart', barData, { 
                margin: { l: 150, r: 60, t: 20, b: 40 }, 
                height: 300,
                xaxis: { title: '日均销量（台）', gridcolor: '#f0f0f0' },
                yaxis: { automargin: true },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, {responsive: true});
            
            // 每日销量走势
            document.getElementById('last7avg').textContent = data.last_7_avg.toLocaleString();
            document.getElementById('monthlyAvg').textContent = data.monthly_avg.toLocaleString();
            
            const dailyDates = Object.keys(data.daily);
            const dailyValues = Object.values(data.daily);
            const dailyData = [{
                x: dailyDates.map(d => d.slice(5)),
                y: dailyValues,
                type: 'bar',
                marker: { color: '#1890ff' },
                hovertemplate: '%{x}<br>销量: %{y}台<extra></extra>'
            }];
            Plotly.newPlot('daily-chart', dailyData, { 
                margin: { l: 60, r: 20, t: 20, b: 60 }, 
                height: 300,
                xaxis: { tickangle: -45, gridcolor: '#f0f0f0' },
                yaxis: { title: '销量（台）', gridcolor: '#f0f0f0' },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, {responsive: true});
        }
        
        // 更新总目标
        function updateTarget(value) {
            const numValue = parseFloat(value);
            if (numValue > 0) {
                dashboardData[currentMonth].targets['总目标'] = numValue / 1000;
                // 重新计算达成率
                const actual = dashboardData[currentMonth].actual_total;
                const newRate = (actual / (numValue / 1000)) * 100;
                dashboardData[currentMonth].achievement_rate = Math.round(newRate * 10) / 10;
                updateDashboard(currentMonth);
            }
        }
        
        // 更新渠道目标
        function updateChannelTarget(channel, value) {
            const numValue = parseFloat(value);
            if (numValue > 0) {
                dashboardData[currentMonth].channel_targets[channel] = numValue / 1000;
                updateDashboard(currentMonth);
            }
        }
        
        init();
    </script>
</body>
</html>
