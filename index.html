<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>2026年1月Pad销售数据看板 v2</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
            background: #f5f7fa; 
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 月份切片器 */
        .month-slicer {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 20px;
            background: white;
            padding: 4px;
            border-radius: 6px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .month-btn {
            padding: 8px 20px;
            border: 1px solid #d9d9d9;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin: 0;
        }
        .month-btn:first-child { border-radius: 4px 0 0 4px; }
        .month-btn:last-child { border-radius: 0 4px 4px 0; }
        .month-btn:not(:first-child) { border-left: none; }
        .month-btn:hover { background: #f5f5f5; }
        .month-btn.active { 
            background: #1890ff; 
            color: white;
            border-color: #1890ff;
        }
        
        /* 顶部标题栏 */
        .header-banner {
            background: linear-gradient(135deg, #ff9500 0%, #ff7700 100%);
            color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-banner h1 { 
            font-size: 28px; 
            font-weight: 600; 
            margin: 0;
            letter-spacing: 1px;
        }
        .header-banner p { 
            font-size: 14px; 
            margin-top: 10px; 
            opacity: 0.9;
        }
        
        /* 第一行：倒计时 + 达成进度 + 店铺Mix */
        .top-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            font-weight: normal;
            text-align: center;
        }
        
        /* 倒计时 */
        .countdown-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .countdown-item {
            background: #1890ff;
            color: white;
            padding: 12px 16px;
            border-radius: 4px;
            text-align: center;
            min-width: 50px;
        }
        .countdown-num {
            font-size: 28px;
            font-weight: bold;
            line-height: 1;
        }
        .countdown-label {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.9;
        }
        .countdown-sep {
            font-size: 24px;
            color: #1890ff;
            font-weight: bold;
        }
        
        /* 达成进度 */
        .achievement-rate {
            text-align: center;
        }
        .achievement-percent {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            line-height: 1;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background: #f0f0f0;
            border-radius: 6px;
            margin: 16px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #52c41a;
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .achievement-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .info-current {
            color: #1890ff;
            font-weight: 500;
        }
        .info-target {
            color: #999;
        }
        .info-target input {
            border: 1px solid #d9d9d9;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 4px;
            width: 60px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }
        
        /* 第二行：4个渠道卡片 */
        .channel-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .channel-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        .channel-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }
        .channel-percent {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
        }
        .channel-progress {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .channel-progress-fill {
            height: 100%;
            background: #1890ff;
            border-radius: 4px;
        }
        .channel-values {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .value-current {
            color: #1890ff;
            font-weight: 500;
        }
        .value-target {
            color: #999;
        }
        .value-target input {
            border: 1px solid #d9d9d9;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
            width: 50px;
            text-align: center;
            font-size: 13px;
            color: #333;
        }
        
        /* 图表行 */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* 每日销量走势特殊样式 */
        .daily-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
        }
        .stat-item {
            font-size: 14px;
            color: #666;
        }
        .stat-value {
            color: #1890ff;
            font-weight: bold;
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .top-row { grid-template-columns: 1fr; }
            .channel-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <div class="container">

        <!-- 顶部标题 -->

        function init() {
            renderMonthSlicer();
            updateDashboard(currentMonth);

            document.getElementById('genTime').textContent =

                String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        
        function renderMonthSlicer() {
            const container = document.getElementById('monthSlicer');
            container.innerHTML = '';
            
            Object.keys(dashboardData).forEach(month => {
                const btn = document.createElement('button');
                btn.className = 'month-btn' + (month === currentMonth ? ' active' : '');
                btn.textContent = month;
                btn.onclick = () => {
                    currentMonth = month;
                    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateDashboard(month);
                };
                container.appendChild(btn);
            });
        }
        
        function updateDashboard(month) {
            const data = dashboardData[month];
            
            // 更新标题
            document.getElementById('headerTitle').textContent = month + '直营平板销售';
            document.getElementById('headerSubtitle').innerHTML = '数据时间：2026年' + month + ' | 生成时间：<span id="genTime">' + document.getElementById('genTime').textContent + '</span>';
            document.querySelectorAll('.month-num').forEach(el => el.textContent = data.month_num);
            
            // 更新倒计时
            updateCountdown(data.month_num, data.last_day);
            
            // 更新达成进度
            document.getElementById('achievementRate').textContent = data.achievement_rate + '%';
            document.getElementById('progressBar').style.width = Math.min(data.achievement_rate, 100) + '%';
            document.getElementById('currentSales').textContent = data.actual_total;
            
            // 更新渠道卡片
            renderChannelCards(data);
            
            // 更新图表
            renderCharts(data);
        }
        
        function updateCountdown(monthNum, lastDay) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const endDate = new Date(currentYear, monthNum, lastDay, 23, 59, 59);
            
            const diff = endDate - now;
            
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                document.getElementById('cd-months').textContent = 0;
                document.getElementById('cd-days').textContent = days;
                document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
            } else {
                document.getElementById('cd-months').textContent = 0;
                document.getElementById('cd-days').textContent = 0;
                document.getElementById('cd-hours').textContent = '00';
            }
        }

                const target = data.channel_targets[ch];
                const rate = target > 0 ? Math.round((actual / target) * 100) : 0;
                
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `

                    <div class="channel-percent">${rate}%</div>
                    <div class="channel-progress">

            Plotly.newPlot('gw-bayday-chart', gwBayData, {

                height: 330,
                xaxis: {
                    tickangle: -45,
                    showgrid: false,
                    tickmode: 'linear',
                    dtick: 2,
                    tickfont: { size: 10 }
                },
                yaxis: { showgrid: false, range: [0, gwMax * 1.2] },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                showlegend: false
            }, {responsive: true});
            
            // 第六行：天猫Bay Day
            const tmDaily = data.channel_daily['天猫'];
            const tmDates = Object.keys(tmDaily);
            const tmValues = Object.values(tmDaily);
            const tmMonthlyAvg = Math.round(tmValues.reduce((a, b) => a + b, 0) / tmValues.length);
            const tmLast7Avg = Math.round(tmValues.slice(-7).reduce((a, b) => a + b, 0) / Math.min(7, tmValues.length));
            
            document.getElementById('tm-monthly-avg').textContent = tmMonthlyAvg;
            document.getElementById('tm-last7-avg').textContent = tmLast7Avg;
            
            const tmMax = Math.max(...tmValues);
            const tmBayData = [{
                x: tmDates.map(formatDate),
                y: tmValues,
                type: 'scatter',
                mode: 'lines+markers+text',
                line: { color: '#faad14', width: 2 },
                marker: { size: 6, color: '#faad14' },
                text: tmValues.map((v, i) => i % 3 === 0 || i === tmValues.length - 1 ? v : ''),
                textposition: 'top center',
                textfont: { size: 10 },
                hovertemplate: '%{x}<br>销量: %{y}台<extra></extra>'
            }];
            Plotly.newPlot('tm-bayday-chart', tmBayData, {
                margin: { l: 50, r: 20, t: 50, b: 80 },
                height: 330,
                xaxis: {
                    tickangle: -45,
                    showgrid: false,
                    tickmode: 'linear',
                    dtick: 2,
                    tickfont: { size: 10 }
                },
                yaxis: { showgrid: false, range: [0, tmMax * 1.2] },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                showlegend: false
            }, {responsive: true});
            
            // 第六行：抖音Bay Day
            const dyDaily = data.channel_daily['抖快'];
            const dyDates = Object.keys(dyDaily);
            const dyValues = Object.values(dyDaily);
            const dyMonthlyAvg = Math.round(dyValues.reduce((a, b) => a + b, 0) / dyValues.length);
            const dyLast7Avg = Math.round(dyValues.slice(-7).reduce((a, b) => a + b, 0) / Math.min(7, dyValues.length));
            
            document.getElementById('dy-monthly-avg').textContent = dyMonthlyAvg;
            document.getElementById('dy-last7-avg').textContent = dyLast7Avg;
            
            const dyMax = Math.max(...dyValues);
            const dyBayData = [{
                x: dyDates.map(formatDate),
                y: dyValues,
                type: 'scatter',
                mode: 'lines+markers+text',
                line: { color: '#f5222d', width: 2 },
                marker: { size: 6, color: '#f5222d' },
                text: dyValues.map((v, i) => i % 3 === 0 || i === dyValues.length - 1 ? v : ''),
                textposition: 'top center',
                textfont: { size: 10 },
                hovertemplate: '%{x}<br>销量: %{y}台<extra></extra>'
            }];
            Plotly.newPlot('dy-bayday-chart', dyBayData, {
                margin: { l: 50, r: 20, t: 50, b: 80 },
                height: 330,
                xaxis: {
                    tickangle: -45,
                    showgrid: false,
                    tickmode: 'linear',
                    dtick: 2,
                    tickfont: { size: 10 }
                },
                yaxis: { showgrid: false, range: [0, dyMax * 1.2] },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                showlegend: false
            }, {responsive: true});
            
            // 第七行：重点产品分天销售走势
            const topProducts = Object.keys(data.models.key_models).slice(0, 5);
            const productColors = ['#1890ff', '#52c41a', '#722ed1', '#faad14', '#f5222d'];
            const productTrendData = topProducts.map((prod, idx) => {
                const prodSales = data.daily;
                const dates = Object.keys(prodSales);
                // 按机型占比分配每日销量
                const totalKeyModels = Object.values(data.models.key_models).reduce((a, b) => a + b, 0);
                const prodRatio = data.models.key_models[prod] / totalKeyModels;
                const values = Object.values(prodSales).map(v => Math.round(v * prodRatio));
                
                return {
                    x: dates.map(formatDate),
                    y: values,
                    type: 'scatter',
                    mode: 'lines',
                    name: prod,
                    line: { color: productColors[idx], width: 2 }
                };
            });
            
            Plotly.newPlot('product-trend-chart', productTrendData, {
                margin: { l: 60, r: 20, t: 40, b: 80 },
                height: 400,
                xaxis: {
                    tickangle: -45,
                    showgrid: false,
                    title: '日期',
                    tickfont: { size: 10 }
                },
                yaxis: { 
                    showgrid: false,
                    title: '销量（台）'
                },
                legend: {
                    orientation: 'h',
                    y: 1.1,
                    x: 0.5,
                    xanchor: 'center'
                },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, {responsive: true});
        }
        
        // 更新总目标
        function updateTarget(value) {
            const numValue = parseFloat(value);
            if (numValue > 0) {
                dashboardData[currentMonth].targets['总目标'] = numValue / 1000;
                // 重新计算达成率
                const actual = dashboardData[currentMonth].actual_total;
                const newRate = (actual / (numValue / 1000)) * 100;
                dashboardData[currentMonth].achievement_rate = Math.round(newRate * 10) / 10;
                updateDashboard(currentMonth);
            }
        }
        
        // 更新渠道目标
        function updateChannelTarget(channel, value) {
            const numValue = parseFloat(value);
            if (numValue > 0) {
                dashboardData[currentMonth].channel_targets[channel] = numValue / 1000;
                updateDashboard(currentMonth);
            }
        }
        
        init();
    </script>
</body>
</html>
