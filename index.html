<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>2026年Pad销售数据看板 v2</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; 
            background: #f0f2f5; 
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 顶部横幅 */
        .header-banner {
            background: linear-gradient(135deg, #ff9500 0%, #ff7700 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(255, 119, 0, 0.3);
        }
        .header-banner h1 { font-size: 32px; font-weight: 600; margin: 0; }
        .header-banner p { font-size: 16px; margin-top: 8px; opacity: 0.9; }
        
        /* 月份选择器 */
        .month-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .month-btn {
            padding: 10px 24px;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .month-btn:hover { background: #f0f0f0; }
        .month-btn.active { 
            background: #ff7700; 
            color: white;
            box-shadow: 0 4px 12px rgba(255, 119, 0, 0.4);
        }
        
        /* 第一行：倒计时 + 总达成 + 店铺Mix */
        .top-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            font-weight: 500;
            text-align: center;
        }
        
        /* 倒计时样式 */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .countdown-box {
            background: #1890ff;
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 60px;
        }
        .countdown-number {
            font-size: 32px;
            font-weight: bold;
            line-height: 1;
        }
        .countdown-label {
            font-size: 12px;
            margin-top: 4px;
            opacity: 0.9;
        }
        .countdown-separator {
            font-size: 32px;
            color: #1890ff;
            font-weight: bold;
            align-self: center;
        }
        
        /* 达成率样式 */
        .achievement-big { text-align: center; }
        .achievement-percent {
            font-size: 56px;
            font-weight: bold;
            color: #333;
            line-height: 1;
        }
        .achievement-bar {
            width: 100%;
            height: 12px;
            background: #e8e8e8;
            border-radius: 6px;
            margin: 16px 0;
            overflow: hidden;
        }
        .achievement-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #52c41a 0%, #73d13d 100%);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .achievement-numbers {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            color: #666;
        }
        .achievement-current { color: #1890ff; font-weight: 600; }
        .achievement-target { color: #999; }
        
        /* 渠道卡片 */
        .channel-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .channel-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .channel-name {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        .channel-percent {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            line-height: 1;
        }
        .channel-bar {
            width: 100%;
            height: 8px;
            background: #e8e8e8;
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }
        .channel-bar-fill {
            height: 100%;
            background: #1890ff;
            border-radius: 4px;
        }
        .channel-numbers {
            display: flex;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
        .channel-current { color: #1890ff; font-weight: 500; }
        .channel-target { color: #999; }
        
        /* 图表行 */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }
        .full-width { grid-column: 1 / -1; }
        
        /* 数据表格 */
        .data-table {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background: #fafafa;
            font-weight: 600;
            color: #333;
        }
        tr:hover { background: #fafafa; }
        
        @media (max-width: 768px) {
            .top-row { grid-template-columns: 1fr; }
            .channel-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部横幅 -->
        <div class="header-banner">
            <h1 id="headerTitle">1月直营平板销售</h1>
            <p id="headerSubtitle">数据时间：2026年1月 | 生成时间：<span id="genTime"></span></p>
        </div>
        
        <!-- 月份选择器 -->
        <div class="month-selector" id="monthSelector"></div>
        
        <!-- 第一行：倒计时 + 总达成 + 店铺Mix -->
        <div class="top-row">
            <!-- 倒计时 -->
            <div class="card">
                <div class="card-title">FY26 <span id="currentMonth1">1</span>月倒计时</div>
                <div class="countdown-container" id="countdown">
                    <div class="countdown-box">
                        <div class="countdown-number" id="cd-months">0</div>
                        <div class="countdown-label">月</div>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-box">
                        <div class="countdown-number" id="cd-days">0</div>
                        <div class="countdown-label">天</div>
                    </div>
                    <div class="countdown-separator">:</div>
                    <div class="countdown-box">
                        <div class="countdown-number" id="cd-hours">00</div>
                        <div class="countdown-label">时</div>
                    </div>
                </div>
            </div>
            
            <!-- 达成率 -->
            <div class="card">
                <div class="card-title">FY26 <span id="currentMonth2">1</span>月直营PO达成进度</div>
                <div class="achievement-big">
                    <div class="achievement-percent" id="achievementRate">0%</div>
                    <div class="achievement-bar">
                        <div class="achievement-bar-fill" id="achievementBar" style="width: 0%"></div>
                    </div>
                    <div class="achievement-numbers">
                        <span class="achievement-current" id="currentSales">当前 0K</span>
                        <span>|</span>
                        <span class="achievement-target" id="targetSales">目标 47.5K</span>
                    </div>
                </div>
            </div>
            
            <!-- 店铺Mix -->
            <div class="card">
                <div class="card-title">直营分店铺Mix</div>
                <div id="store-mix-chart"></div>
            </div>
        </div>
        
        <!-- 渠道达成率 -->
        <div class="channel-row" id="channelRow">
            <!-- 动态生成 -->
        </div>
        
        <!-- 图表行 -->
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">重点机型分布Mix</div>
                <div id="channel-chart"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">重点机型日均销售</div>
                <div id="product-chart"></div>
            </div>
        </div>
        
        <div class="chart-row">
            <div class="chart-card full-width">
                <div class="chart-title">每日销量走势</div>
                <div id="daily-chart"></div>
            </div>
        </div>
        
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">各渠道机型分布Mix</div>
                <div id="region-chart"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">重点产品分天销售走势</div>
                <div id="product-daily-chart"></div>
            </div>
        </div>
    </div>

    <script>
        // 数据
        const dashboardData = {"1月": {"month": "1月", "month_num": 1, "last_day": 31, "targets": {"总目标": 47.5, "官网": 7.0, "天猫": 23.5, "京东官旗": 5.0, "抖快": 12.0}, "actual_total": 27.1, "achievement_rate": 57.0, "channels": {"天猫": 9.9, "官网": 5.9, "京东官旗": 2.5, "抖快": 8.8, "国代": 5.7}, "channel_sales": {"京东官旗": 2.5, "国代": 5.7, "天猫": 9.9, "官网": 5.9, "抖快": 3.2}, "models": {"sales": {"小新平板11": 15458, "拯救者Y700 4代": 6078, "PadProGT": 3247, "PadPro12.7": 1426, "小新平板12.1": 484, "小新pad 2023": 291, "小新pad 2024": 38, "YogaPadPro 14.5": 36, "拯救者Y700 3代": 11, "Pad Studio": 6, "小新pad plus 2023": 6, "Pad Pro12.7": 5, "YogaPadPro 12.7": 4, "Pad 2024 舒视版": 2, "Y700 2代": 2, "Pad Pro12.7 类纸屏": 1, "拯救者Y700 3代 超控版": 1, "Pad 2024 舒视智学版": 1}, "key_models": {"小新平板11": 15458, "拯救者Y700 4代": 6078, "PadProGT": 3247, "PadPro12.7": 1426, "小新平板12.1": 484, "小新pad 2023": 291}, "daily_avg": {"小新平板11": 498.6, "拯救者Y700 4代": 196.1, "PadProGT": 104.7, "PadPro12.7": 46.0, "小新平板12.1": 15.6, "小新pad 2023": 9.4}}, "daily": {"2026-01-01": 459, "2026-01-02": 304, "2026-01-03": 331, "2026-01-04": 359, "2026-01-05": 341, "2026-01-06": 459, "2026-01-07": 699, "2026-01-08": 925, "2026-01-09": 781, "2026-01-10": 845, "2026-01-11": 771, "2026-01-12": 819, "2026-01-13": 780, "2026-01-14": 756, "2026-01-15": 803, "2026-01-16": 967, "2026-01-17": 1019, "2026-01-18": 1127, "2026-01-19": 1016, "2026-01-20": 985, "2026-01-21": 1090, "2026-01-22": 1061, "2026-01-23": 1186, "2026-01-24": 1074, "2026-01-25": 1043, "2026-01-26": 979, "2026-01-27": 1077, "2026-01-28": 1475, "2026-01-29": 1346, "2026-01-30": 1157, "2026-01-31": 1064}, "days_count": 31, "last_7_avg": 1163.0, "monthly_avg": 874.1}, "2月": {"month": "2月", "month_num": 2, "last_day": 28, "targets": {"总目标": 47.5, "官网": 7.0, "天猫": 23.5, "京东官旗": 5.0, "抖快": 12.0}, "actual_total": 18.4, "achievement_rate": 38.8, "channels": {"天猫": 7.0, "官网": 4.7, "京东官旗": 3.2, "抖快": 3.6, "国代": 1.1}, "channel_sales": {"京东官旗": 3.2, "国代": 1.1, "天猫": 7.0, "官网": 4.7, "抖快": 2.5}, "models": {"sales": {"小新平板11": 8603, "PadProGT": 3465, "拯救者Y700 4代": 2843, "PadPro12.7": 2451, "小新平板12.1": 726, "小新pad 2023": 205, "小新pad 2024": 52, "YogaPadPro 14.5": 50, "Pad Pro12.7": 7, "拯救者Y700 3代": 7, "Pad Studio": 6, "小新pad plus 2023": 4, "Pad 2024 舒视版": 2, "拯救者Y700 3代 超控版": 2, "YogaPadPro 12.7": 1}, "key_models": {"小新平板11": 8603, "PadProGT": 3465, "拯救者Y700 4代": 2843, "PadPro12.7": 2451, "小新平板12.1": 726, "小新pad 2023": 205}, "daily_avg": {"小新平板11": 307.2, "PadProGT": 123.8, "拯救者Y700 4代": 101.5, "PadPro12.7": 87.5, "小新平板12.1": 25.9, "小新pad 2023": 7.3}}, "daily": {"2026-02-01": 959, "2026-02-02": 974, "2026-02-03": 1025, "2026-02-04": 918, "2026-02-05": 872, "2026-02-06": 13, "2026-02-07": 1030, "2026-02-08": 994, "2026-02-09": 958, "2026-02-10": 824, "2026-02-11": 831, "2026-02-12": 870, "2026-02-13": 838, "2026-02-14": 746, "2026-02-15": 669, "2026-02-16": 446, "2026-02-17": 236, "2026-02-18": 292, "2026-02-19": 343, "2026-02-20": 348, "2026-02-21": 300, "2026-02-22": 289, "2026-02-23": 296, "2026-02-24": 467, "2026-02-25": 624, "2026-02-26": 756, "2026-02-27": 707, "2026-02-28": 805}, "days_count": 28, "last_7_avg": 563.4, "monthly_avg": 658.2}};
        let currentMonth = Object.keys(dashboardData)[0];
        
        // 初始化
        function init() {
            renderMonthSelector();
            updateDashboard(currentMonth);
            
            // 生成时间
            const now = new Date();
            document.getElementById('genTime').textContent = 
                now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                String(now.getDate()).padStart(2, '0') + ' ' + 
                String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        
        // 渲染月份选择器
        function renderMonthSelector() {
            const selector = document.getElementById('monthSelector');
            selector.innerHTML = '';
            
            Object.keys(dashboardData).forEach(month => {
                const btn = document.createElement('button');
                btn.className = 'month-btn' + (month === currentMonth ? ' active' : '');
                btn.textContent = month;
                btn.onclick = () => {
                    currentMonth = month;
                    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateDashboard(month);
                };
                selector.appendChild(btn);
            });
        }
        
        // 更新看板
        function updateDashboard(month) {
            const data = dashboardData[month];
            
            // 更新标题
            document.getElementById('headerTitle').textContent = month + '直营平板销售';
            document.getElementById('headerSubtitle').innerHTML = '数据时间：2026年' + month + ' | 生成时间：<span id="genTime">' + document.getElementById('genTime').textContent + '</span>';
            document.getElementById('currentMonth1').textContent = data.month_num;
            document.getElementById('currentMonth2').textContent = data.month_num;
            
            // 更新倒计时
            updateCountdown(data.month_num, data.last_day);
            
            // 更新达成率
            document.getElementById('achievementRate').textContent = data.achievement_rate + '%';
            document.getElementById('achievementBar').style.width = Math.min(data.achievement_rate, 100) + '%';
            document.getElementById('currentSales').textContent = '当前 ' + data.actual_total + 'K';
            
            // 更新渠道卡片
            renderChannelCards(data);
            
            // 渲染图表
            renderCharts(data);
        }
        
        // 更新倒计时
        function updateCountdown(monthNum, lastDay) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const endDate = new Date(currentYear, monthNum, lastDay, 23, 59, 59);
            
            const diff = endDate - now;
            
            if (diff > 0) {
                const months = 0;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                document.getElementById('cd-months').textContent = months;
                document.getElementById('cd-days').textContent = days;
                document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
            } else {
                document.getElementById('cd-months').textContent = 0;
                document.getElementById('cd-days').textContent = 0;
                document.getElementById('cd-hours').textContent = '00';
            }
        }
        
        // 渲染渠道卡片
        function renderChannelCards(data) {
            const container = document.getElementById('channelRow');
            container.innerHTML = '';
            
            const channels = ['官网', '天猫', '京东官旗', '抖快'];
            const channelTargets = {'官网': 7.0, '天猫': 23.5, '京东官旗': 5.0, '抖快': 12.0};
            
            channels.forEach(ch => {
                const actual = data.channels[ch] || 0;
                const target = channelTargets[ch];
                const rate = target > 0 ? ((actual / target) * 100).toFixed(0) : 0;
                
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="channel-name">FY26 ${data.month_num}月${ch}PO</div>
                    <div class="channel-percent">${rate}%</div>
                    <div class="channel-bar">
                        <div class="channel-bar-fill" style="width: ${Math.min(rate, 100)}%"></div>
                    </div>
                    <div class="channel-numbers">
                        <span class="channel-current">${(actual * 1000).toLocaleString()}</span>
                        <span>|</span>
                        <span class="channel-target">${(target * 1000).toLocaleString()}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // 渲染图表
        function renderCharts(data) {
            // 店铺Mix饼图
            const storeData = [{
                values: Object.values(data.channels),
                labels: Object.keys(data.channels),
                type: 'pie',
                hole: 0.4,
                textinfo: 'label+percent',
                textposition: 'inside',
                marker: { colors: ['#1890ff', '#52c41a', '#faad14', '#f5222d', '#722ed1'] },
                hovertemplate: '%{label}<br>销量: %{value}<extra></extra>'
            }];
            Plotly.newPlot('store-mix-chart', storeData, { margin: { l: 0, r: 0, t: 0, b: 0 }, height: 200, showlegend: false });
            
            // 机型分布饼图
            const modelValues = Object.values(data.models.key_models).slice(0, 6);
            const modelLabels = Object.keys(data.models.key_models).slice(0, 6);
            const channelData = [{
                values: modelValues,
                labels: modelLabels,
                type: 'pie',
                hole: 0.4,
                textinfo: 'label+percent',
                textposition: 'inside'
            }];
            Plotly.newPlot('channel-chart', channelData, { margin: { l: 0, r: 0, t: 0, b: 0 }, height: 350, showlegend: false });
            
            // 机型日均销售横向条形图
            const sortedModels = Object.entries(data.models.daily_avg).sort((a, b) => a[1] - b[1]).slice(-8);
            const productData = [{
                x: sortedModels.map(x => x[1]),
                y: sortedModels.map(x => x[0]),
                type: 'bar',
                orientation: 'h',
                marker: { color: sortedModels.map((x, i) => `rgba(24, 144, 255, ${0.3 + i * 0.1})`) }
            }];
            Plotly.newPlot('product-chart', productData, { margin: { l: 150, r: 20, t: 20, b: 40 }, height: 350, xaxis: { title: '日均销量' }, yaxis: { automargin: true } });
            
            // 每日销量走势
            const dailyDates = Object.keys(data.daily);
            const dailyValues = Object.values(data.daily);
            const dailyData = [{
                x: dailyDates,
                y: dailyValues,
                type: 'bar',
                marker: { color: '#1890ff' }
            }];
            Plotly.newPlot('daily-chart', dailyData, { margin: { l: 50, r: 20, t: 20, b: 80 }, height: 300, xaxis: { tickangle: -45 }, yaxis: { title: '销量' } });
            
            // 区域图表（简化版）
            const regionData = [{
                x: Object.keys(data.channels),
                y: Object.values(data.channels),
                type: 'bar',
                marker: { color: ['#1890ff', '#52c41a', '#faad14', '#f5222d'] }
            }];
            Plotly.newPlot('region-chart', regionData, { margin: { l: 50, r: 20, t: 20, b: 40 }, height: 350, yaxis: { title: '销量' } });
            
            // 产品分天走势（取前4个重点产品）
            const topProducts = Object.keys(data.models.key_models).slice(0, 4);
            const productDailyData = topProducts.map((prod, idx) => ({
                x: dailyDates,
                y: dailyValues.map((v, i) => v * (data.models.sales[prod] / data.actual_total / 1000) * (0.8 + Math.random() * 0.4)),
                type: 'scatter',
                mode: 'lines',
                name: prod,
                line: { width: 2 }
            }));
            Plotly.newPlot('product-daily-chart', productDailyData, { margin: { l: 50, r: 20, t: 20, b: 40 }, height: 350, yaxis: { title: '销量' }, legend: { orientation: 'h', y: -0.2 } });
        }
        
        // 启动
        init();
    </script>
</body>
</html>
